<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2CT 数据抓取</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #333;
      width: 280px;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn {
      padding: 10px 16px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-record {
      background: #1989fa;
      color: #fff;
    }
    .btn-record:hover { background: #0d7de0; }
    .btn-record.recording {
      background: #e74c3c;
    }
    .btn-record.recording:hover { background: #c0392b; }
    .btn-save {
      background: #27ae60;
      color: #fff;
    }
    .btn-save:hover { background: #219a52; }
    .btn-clear {
      background: #95a5a6;
      color: #fff;
    }
    .btn-clear:hover { background: #7f8c8d; }
    .stats-panel {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      max-height: 240px;
      overflow-y: auto;
    }
    .stats-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: #555;
    }
    .stats-empty {
      color: #999;
      font-size: 13px;
    }
    .stats-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .stats-item:last-child { border-bottom: none; }
    .stats-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 8px;
    }
    .stats-count {
      color: #1989fa;
      font-weight: 600;
      flex-shrink: 0;
    }
    .total-bar {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #ddd;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>
  <h2>CS2CT 皮肤数据抓取</h2>

  <div class="btn-group">
    <button id="recordBtn" class="btn btn-record">开始录制</button>
    <button id="saveBtn" class="btn btn-save">保存到本地</button>
    <button id="clearBtn" class="btn btn-clear">清除</button>
  </div>

  <div class="stats-panel">
    <div class="stats-title">抓取统计（按皮肤名称）</div>
    <div id="statsList" class="stats-empty">暂无数据，开始录制后访问商品页即可抓取</div>
    <div id="totalBar" class="total-bar" style="display: none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
